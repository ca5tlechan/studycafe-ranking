# Render Blueprint (Phase 12). Docker 로 단일 서비스 빌드/배포.
# 배치 신뢰성(§3.6a): 무료 플랜은 15분 유휴 시 spin-down·재시작이 가능하다. 이를 3중으로 방어한다 —
#   ① UptimeRobot 이 /healthz 를 14분마다 핑해 인스턴스를 깨워두면 @Scheduled 04:00/03:30 이 정시에 뜬다.
#   ② closeOverdue 는 멱등 — 배치가 늦게 돌아도 세션을 각자의 04:00 경계로 정확히 마감한다.
#   ③ StartupCatchUp: 그래도 04:00 을 놓친 채 재시작되면 기동 시 밀린 마감을 한 번 보정한다.
#   (03:30 사전 알림은 시점 지나면 무의미해 catch-up 대상 아님 — 베스트 에포트 §8.4.)
# 시크릿(sync: false)은 커밋하지 않고 Render 대시보드에서 직접 입력한다.
services:
  - type: web
    name: studycafe-ranking
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: JWT_COOKIE_SECURE
        value: "true"          # 프로덕션은 HTTPS → Secure 쿠키
      - key: VAPID_SUBJECT
        value: "mailto:admin@studycafe.app"   # 비밀 아님(연락처). 실제 값으로 바꿔도 됨
      # --- 아래는 대시보드에서 직접 입력(커밋 금지) ---
      - key: JWT_SECRET
        sync: false            # 32바이트+ 랜덤
      - key: DB_URL
        sync: false            # jdbc:postgresql://<neon-host>/<db>?sslmode=require
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: ADMIN_LOGIN_ID
        sync: false            # 초기 관리자로 승격할 계정 loginId
