server:
  # Render 등 PaaS 는 리스닝 포트를 PORT 환경변수로 주입한다. 로컬은 8080.
  port: ${PORT:8080}

spring:
  application:
    name: ranking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/studycafe}
    username: ${DB_USERNAME:studycafe}
    password: ${DB_PASSWORD:studycafe}
  jpa:
    hibernate:
      ddl-auto: update   # 파일럿 개발 편의용. 스키마 안정화되면 Flyway 마이그레이션으로 전환 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    # 필수: 환경변수 JWT_SECRET 로만 주입(HMAC-SHA256 → 최소 32바이트). 기본값 없음 → 미설정 시 기동 실패(fail-fast).
    # 커밋된 기본 시크릿은 프로덕션 오설정 시 토큰 위조 위험이 있어 두지 않는다.
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}   # 7일
    # 인증 쿠키 Secure 속성. 프로덕션(HTTPS)은 true. 로컬 http 검증 시에만 JWT_COOKIE_SECURE=false.
    cookie-secure: ${JWT_COOKIE_SECURE:true}
  admin:
    # 초기 관리자로 승격할 계정 loginId. 그 계정이 이후 다른 계정에 권한을 부여/회수한다.
    # 비어 있으면 부트스트랩 관리자 없음(가입 후 이 값을 넣고 재기동).
    login-id: ${ADMIN_LOGIN_ID:}
  push:
    # Web Push(§3.6b, §8.4). VAPID 공개/개인 키가 둘 다 있어야 활성화되고, 없으면 no-op 로 기동.
    # 키는 비밀정보이므로 환경변수로만 주입(커밋 금지). 생성: `npx web-push generate-vapid-keys`
    #   VAPID_PUBLIC_KEY=<base64url 65바이트>, VAPID_PRIVATE_KEY=<base64url 32바이트>
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:admin@studycafe.app}   # RFC 8292 연락처(mailto:/https:), 비밀 아님
    # 03:30 사전 알림 배치 — 파일럿에선 비활성("-" = @Scheduled 미등록). iOS Web Push 미도달로 알림 UI 를
    # 숨긴 상태와 짝. 되살리려면 "0 30 3 * * *" 로 되돌리고 MyPage 의 <PushToggle /> 을 복구한다. KST 기준.
    pre-close-cron: ${PRE_CLOSE_NOTIFY_CRON:-}

# 실제 시크릿(JWT 등)은 여기 리터럴로 넣지 말 것. 환경변수(${...}) 또는 .env / application-local.yml(gitignore됨)로 주입.
