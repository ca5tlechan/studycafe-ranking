spring:
  application:
    name: ranking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/studycafe}
    username: ${DB_USERNAME:studycafe}
    password: ${DB_PASSWORD:studycafe}
  jpa:
    hibernate:
      ddl-auto: update   # 파일럿 개발 편의용. 스키마 안정화되면 Flyway 마이그레이션으로 전환 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    # 실제 값은 환경변수 JWT_SECRET 로 주입(HMAC-SHA256 → 최소 32바이트). 아래는 로컬 개발 전용 기본값.
    secret: ${JWT_SECRET:dev-only-insecure-secret-please-change-me-minimum-32-bytes-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}   # 7일

# 실제 시크릿(JWT 등)은 여기 리터럴로 넣지 말 것. 환경변수(${...}) 또는 .env / application-local.yml(gitignore됨)로 주입.
