services:
  db:
    image: postgres:17
    container_name: studycafe-db
    environment:
      POSTGRES_DB: studycafe
      POSTGRES_USER: studycafe
      POSTGRES_PASSWORD: studycafe
    ports:
      # 호스트 5433 → 컨테이너 5432. 로컬/Homebrew Postgres가 쓰는 5432와 충돌 방지.
      - "5433:5432"
    volumes:
      - studycafe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studycafe -d studycafe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  studycafe-pgdata:
